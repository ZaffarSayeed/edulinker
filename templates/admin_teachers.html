{% extends "admin.html" %}

{% block content %}

<h3 class="mb-4">Teacher Management</h3>

<!-- 🔷 Stats -->
<div class="row mb-4">
    <div class="col-md-3">
        <div class="card p-3 shadow-sm card-box">
            <h6>Total Teachers</h6>
            <h3>{{ teachers|length }}</h3>
        </div>
    </div>
</div>

<!-- 🔷 Table -->
<div class="card shadow-sm p-3">
    <table class="table table-hover align-middle">
        <thead class="table-light">
            <tr>
                <th>Photo</th>
                <th>Name</th>
                <th>Subject</th>
                <th>Location</th>
                <th>Mobile</th>
                <th class="text-end">Action</th>
            </tr>
        </thead>

        <tbody>
            {% for t in teachers %}
            <tr>
                <td>
                    <img src="/static/uploads/{{ t.photo }}" 
                         width="50" 
                         style="border-radius:8px;">
                </td>

                <td class="fw-semibold">{{ t.name }}</td>
                <td>{{ t.subject }}</td>
                <td>{{ t.location }}</td>
                <td>{{ t.phone }}</td>

                <td class="text-end">
                    <a href="/delete_teacher/{{ t.id }}" 
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete this teacher?')">
                       Remove
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
</body>
</html>
