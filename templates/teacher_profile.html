<!DOCTYPE html>
<html>
<head>
    <title>Teacher Profile</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

     <!-- Favicon -->

     <link rel="icon"
     type="image/png"
     href="{{ url_for('static', filename='favicon.png') }}">
     

    <style>
        body {
            background: #f5f7fb;
        }

        .profile-card {
            border-radius: 12px;
            padding: 30px;
        }

        .badge-subject {
            background: #e0e7ff;
            color: #1e3a8a;
        }
        .top-bar {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

<!-- 🔷 Top Bar -->
<div class="top-bar d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Available Tutors</h5>
    <a href="/" class="btn btn-outline-primary btn-sm">Back to Home</a>
</div>

<div class="container mt-5">

    <div class="card profile-card shadow">

        <!-- Header -->
        <div class="text-center mb-4">
            <img src="/static/uploads/{{ teacher.photo }}" 
                 onerror="this.src='/static/default.png'"
                 style="width:150px; height:150px; object-fit:cover; border-radius:50%;">
        </div>
        
        <div class="d-flex justify-content-between align-items-center">
            <h3 class="fw-bold">{{ teacher.name }}</h3>

            <a href="/request_teacher/{{ teacher.id }}" class="btn btn-primary">
                Request Tutor
            </a>
        </div>

        <!-- Subject -->
        <span class="badge badge-subject mt-2">
            {{ teacher.subject }}
        </span>

        <!-- Location -->
        <p class="mt-3"><strong>📍 Location:</strong> {{ teacher.location }}</p>

        <!-- About -->
        <hr>
        <h5>About</h5>
        <p>
            Experienced tutor specializing in {{ teacher.subject }}.
            Passionate about helping students succeed.
        </p>

        <!-- Resume -->
        <!-- <hr>
        <a href="/static/uploads/{{ teacher.resume }}" 
           target="_blank" 
           class="btn btn-outline-secondary">
           View Resume
        </a> -->

    </div>

</div>

</body>
</html>
