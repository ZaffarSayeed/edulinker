<!DOCTYPE html>
<html>
<head>
    <title>Request Teacher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

     <!-- Favicon -->

     <link rel="icon"
     type="image/png"
     href="{{ url_for('static', filename='favicon.png') }}">
     
    <style>
      body {
            background: #f5f7fb;
        }

      .top-bar {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

    <!-- 🔷 Top Bar -->
<div class="top-bar d-flex justify-content-between align-items-center">
  <h5 class="mb-0">Available Tutors</h5>
  <a href="/" class="btn btn-outline-primary btn-sm">Back to Home</a>
</div>

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3>Student Request This Teacher</h3>

        <form method="POST">
            <input type="text" name="name" class="form-control mb-3" placeholder="Student Name">
            <input type="text" name="phone" class="form-control mb-3" placeholder="Phone Number">

            <button class="btn btn-primary w-100">Send Request</button>
        </form>
    </div>
</div>

</body>
</html>
