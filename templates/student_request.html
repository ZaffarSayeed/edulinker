<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

     <!-- Favicon -->

     <link rel="icon"
     type="image/png"
     href="{{ url_for('static', filename='favicon.png') }}">

     
    <title>Student Request to Teacher</title>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Home Tuition</a>
  
      <div>
        <a href="/teacher" class="btn btn-outline-light me-2">Become Teacher</a>
        <a href="/student" class="btn btn-warning me-2">Find Teacher</a>
        <a href="/admin" class="btn btn-danger">Admin</a>
      </div>
    </div>
  </nav>
   
      <h2>Student Request</h2>

      <div class="container mt-5">
        <div class="card shadow p-4">
          <h3 class="mb-4">Request a Teacher</h3>
      
          <form method="POST" enctype="multipart/form-data">
      
            <div class="mb-3">
              <input type="text" name="name" class="form-control" placeholder="Full Name">
            </div>
      
            <div class="mb-3">
              <input type="text" name="phone" class="form-control" placeholder="Phone Number">
            </div>
      
            <div class="mb-3">
              <input type="email" name="email" class="form-control" placeholder="Email">
            </div>
      
            <div class="mb-3">
              <input type="text" name="subject" class="form-control" placeholder="Subject">
            </div>
      
            <div class="mb-3">
              <input type="text" name="location" class="form-control" placeholder="Location">
            </div>
      
            <div class="mb-3">
              <input type="file" name="resume" class="form-control">
            </div>
      
            <div class="form-check mb-3">
              <input type="checkbox" name="agreement" class="form-check-input">
              <label class="form-check-label">
                I agree to ₹500 consultancy fee after successful connection
              </label>
            </div>
      
            <button class="btn btn-success w-100">Register</button>
      
          </form>
        </div>
      </div>
</body>
</html>
