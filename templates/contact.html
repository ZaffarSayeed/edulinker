<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Contact Us | EduLinker</title>

    <meta name="description"
          content="Contact EduLinker for home tuition support and tutor inquiries.">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <style>

        body {

            font-family: 'Poppins', sans-serif;

            background: #f8fafc;
        }

        .contact-section {

            padding: 80px 0;
        }

        .contact-card {

            background: white;

            padding: 40px;

            border-radius: 20px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .form-control {

            height: 50px;

            border-radius: 10px;
        }

        textarea.form-control {

            height: 140px;
        }

        .btn-primary {

            border-radius: 10px;

            padding: 12px;
        }

        footer {

            background: #0f172a;

            color: white;

            padding: 20px 0;
        }

    </style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm">

    <div class="container">

        <a class="navbar-brand" href="/">
            <img src="/static/edulinkerlogo.png"
                 style="height:90px; margin-top: -20px; margin-bottom:-20px;">
        </a>

        <div>

            <a href="/"
               class="btn btn-outline-primary me-2">
                Home
            </a>

            <a href="/about"
               class="btn btn-primary">
                About Us
            </a>

        </div>

    </div>

</nav>

<!-- Contact -->
<section class="contact-section">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="contact-card">

                    <h2 class="fw-bold text-center mb-4">
                        Contact Us
                    </h2>


                    {% with messages = get_flashed_messages() %}
                        {% if messages %}
                            {% for message in messages %}

                            <div class="alert alert-success text-center">

                                {{ message }}

                            </div>

                            {% endfor %}
                        {% endif %}
                        {% endwith %}


                    <form method="POST">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <input type="text"
                                       name="name"
                                       class="form-control"
                                       placeholder="Your Name"
                                       required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <input type="email"
                                       name="email"
                                       class="form-control"
                                       placeholder="Email Address"
                                       required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <input type="text"
                                   name="subject"
                                   class="form-control"
                                   placeholder="Subject">

                        </div>

                        <div class="mb-3">

                            <textarea class="form-control" name="message"
                                      placeholder="Write your message"></textarea>

                        </div>

                        <button class="btn btn-primary w-100">

                            Send Message

                        </button>

                    </form>

                    <div class="text-center mt-5">

                        <p>
                            📧 support@edulinker.com
                        </p>

                        <p>
                            📱 +91 9334060207
                        </p>

                        <p>
                            📍 Patna, Bihar, India
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- Footer -->
<footer class="text-center">

    <div class="container">

        <p class="mb-0">
            © 2026 EduLinker | All Rights Reserved
        </p>

    </div>

</footer>

</body>
</html>
