<!DOCTYPE html>
<html>
<head>
    <title>Available Tutors</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        .card {
            border-radius: 12px;
            border: none;
        }

        .teacher-card {
            transition: 0.3s;
        }

        .teacher-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .badge-subject {
            background: #e0e7ff;
            color: #1e3a8a;
        }

        .top-bar {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

<!-- 🔷 Top Bar -->
<div class="top-bar d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Available Tutors</h5>
    <a href="/" class="btn btn-outline-primary btn-sm">Back to Home</a>
</div>

<!-- 🔷 Results Section -->
<div class="container mt-4">

    {% if teachers %}
        <div class="row">

            {% for t in teachers %}
            <div class="col-md-4 mb-4">
                <div class="card teacher-card shadow-sm p-3">

                    <h5 class="fw-bold">{{ t.name }}</h5>

                    <span class="badge badge-subject mb-2">
                        {{ t.subject }}
                    </span>

                    <p class="mb-1"><strong>📍 Location:</strong> {{ t.location }}</p>

                    <div class="mt-3 d-flex justify-content-between">

                        <!-- <a href="/static/uploads/{{ t.resume }}" 
                           target="_blank" 
                           class="btn btn-outline-secondary btn-sm">
                           View Resume
                        </a> -->

                        <a href="/teacher/{{ t.id }}" class="btn btn-primary btn-sm">
                            View Profile
                        </a>

                    </div>

                </div>
            </div>
            {% endfor %}

        </div>

    {% else %}
        <div class="text-center mt-5">
            <h5>No tutors found 😔</h5>
            <p>Try changing subject or location</p>
        </div>
    {% endif %}

</div>

</body>
</html>
